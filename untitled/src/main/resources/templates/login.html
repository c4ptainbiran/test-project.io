<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="card mx-auto" style="width: 400px;">
    <div class="card-header"><h4>Вход</h4></div>
    <div class="card-body">
        <form th:action="@{/login}" method="post">
            <input type="hidden" name="role" th:value="${role}">
            <div class="mb-3"><input type="text" name="username" class="form-control" placeholder="Логин" required></div>
            <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Пароль" required></div>
            <button type="submit" class="btn btn-primary w-100">Войти</button>
            <a th:href="@{/register(role=${role})}" class="btn btn-link w-100">Регистрация</a>
            <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
        </form>
    </div>
</div>
</body>
</html>
