<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="card mx-auto" style="width: 500px;">
    <div class="card-header"><h4>Регистрация</h4></div>
    <div class="card-body">
        <!-- В action роль передаётся через параметр URL, скрытое поле НЕ нужно -->
        <form th:action="@{/register(role=${role})}" method="post">
            <div class="mb-3">
                <input type="text" name="fullName" class="form-control" placeholder="ФИО" required>
            </div>
            <div class="mb-3">
                <input type="date" name="birthDate" class="form-control" required>
            </div>
            <div class="mb-3">
                <input type="text" name="login" class="form-control" placeholder="Логин" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Пароль" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
            <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
        </form>
    </div>
</div>
</body>
</html>
