<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование заявки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Редактирование заявки № <span th:text="${request.id}"></span></h2>
    <a href="/employee/dashboard" class="btn btn-secondary">Назад</a>
</div>

<form th:action="@{/employee/edit}" method="post" th:object="${request}">
    <input type="hidden" name="id" th:value="${request.id}">

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Госномер</label>
            <input type="text" th:field="*{regNumber}" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Марка</label>
            <input type="text" th:field="*{carMake}" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Модель</label>
            <input type="text" th:field="*{carModel}" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Тип проблемы</label>
            <input type="text" th:field="*{problemType}" class="form-control" required>
        </div>
        <div class="col-12 mb-3">
            <label class="form-label">Описание проблемы</label>
            <textarea th:field="*{problemDescription}" class="form-control" rows="3"></textarea>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Телефон</label>
            <input type="text" th:field="*{phone}" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Дата визита</label>
            <input type="date" th:field="*{visitDate}" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Статус</label>
            <select name="statusId" class="form-select">
                <option th:each="s : ${statuses}" th:value="${s.id}" th:text="${s.name}" th:selected="${s.id == request.status.id}"></option>
            </select>
        </div>
    </div>

    <div class="mt-3">
        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
        <a href="/employee/dashboard" class="btn btn-secondary">Отмена</a>
    </div>
</form>
</body>
</html>
