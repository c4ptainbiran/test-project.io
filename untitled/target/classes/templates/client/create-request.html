<!DOCTYPE html>
<html>
<head>
    <title>Новая заявка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2>Создание заявки</h2>
<form method="post">
    <div class="mb-3"><input type="text" name="regNumber" class="form-control" placeholder="Госномер" required></div>
    <div class="mb-3"><input type="text" name="carMake" class="form-control" placeholder="Марка" required></div>
    <div class="mb-3"><input type="text" name="carModel" class="form-control" placeholder="Модель" required></div>
    <div class="mb-3"><input type="text" name="problemType" class="form-control" placeholder="Тип проблемы" required></div>
    <div class="mb-3"><textarea name="problemDescription" class="form-control" placeholder="Описание"></textarea></div>
    <div class="mb-3"><input type="text" name="phone" class="form-control" placeholder="Телефон" required></div>
    <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="Email"></div>
    <div class="mb-3"><input type="date" name="visitDate" class="form-control" required></div>
    <button type="submit" class="btn btn-success">Отправить</button>
    <a href="/client/profile" class="btn btn-secondary">Назад</a>
</form>
</body>
</html>
